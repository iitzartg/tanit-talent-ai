services:
  mongo:
    image: mongo:7
    container_name: tanit_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tanit_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/espace_utilisateur
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_strong_random_secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_your_clerk_secret_key}
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5001}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_your_clerk_publishable_key}
        VITE_OPENAI_API_KEY: ${VITE_OPENAI_API_KEY:-your_openai_api_key_here}
    container_name: tanit_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo_data:
